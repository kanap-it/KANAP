services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../backend/.env.prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    # Default CMD runs migrations then starts API

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    env_file: ../frontend/.env.prod
    depends_on:
      - api
    ports:
      - "127.0.0.1:8081:80"
    restart: unless-stopped
    # nginx serves SPA; proxy /api to api service

  marketing:
    build:
      context: ../marketing
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8082:80"
    restart: unless-stopped
