# Dev proxy for lvh.me subdomain testing

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# Re-resolve upstream container names via Docker's embedded DNS so nginx
# picks up new IPs after `docker compose up --build api web marketing`
# without needing --force-recreate on this container.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
  listen 80;
  server_name lvh.me www.lvh.me dev.kanap.net;
  client_max_body_size 20m;

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    set $upstream_api api:8080;
    proxy_pass http://$upstream_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    set $upstream_marketing marketing:80;
    proxy_pass http://$upstream_marketing;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

server {
  listen 80;
  server_name *.lvh.me *.dev.kanap.net;
  client_max_body_size 20m;

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    set $upstream_api api:8080;
    proxy_pass http://$upstream_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    set $upstream_web web:5173;
    proxy_pass http://$upstream_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
