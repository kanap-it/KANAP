# QA host Nginx config template
# Deploy as two files in /etc/nginx/sites-available/:
#   - qa.kanap.net           (apex: marketing + API)
#   - tenants.qa.kanap.net   (wildcard: SPA + API)
# Also deploy cloudflare-real-ip.conf → /etc/nginx/conf.d/

# ── Apex: qa.kanap.net ───────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name qa.kanap.net;

    return 301 https://qa.kanap.net$request_uri;
}

# HTTPS for apex (marketing on /, API on /api)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qa.kanap.net;

    ssl_certificate     /etc/ssl/cloudflare/qa.kanap.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/qa.kanap.net.key;

    # Modern SSL settings for Cloudflare origin
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/qa.kanap.net.access.log;
    error_log  /var/log/nginx/qa.kanap.net.error.log warn;

    client_max_body_size 50m;

    # Canonicalize /api → /api/
    location = /api { return 301 /api/; }

    # API on apex: strip the /api prefix before proxying
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8080/;   # TRAILING SLASH strips /api/
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_redirect off;
    }

    # Everything else → marketing container
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";
        proxy_redirect off;
    }
}

# ── Tenants: *.qa.kanap.net ──────────────────────────────────────

# HTTP → HTTPS for all tenant subdomains
server {
    listen 80;
    listen [::]:80;
    server_name *.qa.kanap.net;

    return 301 https://$host$request_uri;
}

# HTTPS for tenant subdomains (NOT the apex)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.qa.kanap.net;

    ssl_certificate     /etc/ssl/cloudflare/qa.kanap.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/qa.kanap.net.key;

    # Modern SSL settings for Cloudflare origin
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/tenants.qa.kanap.net.access.log;
    error_log  /var/log/nginx/tenants.qa.kanap.net.error.log warn;

    client_max_body_size 50m;

    # Canonicalize /api → /api/
    location = /api { return 301 /api/; }

    # Tenant API: strip the /api prefix before proxying
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8080/;   # TRAILING SLASH strips /api/
        proxy_set_header Host                $host;   # keep subdomain for tenant-aware backend
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_redirect off;
    }

    # Everything else → SPA container
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host                $host;   # preserve <slug>.qa.kanap.net for SPA routing
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";
        proxy_redirect off;
    }
}
