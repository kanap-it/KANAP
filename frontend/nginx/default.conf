server {
  listen 80;
  server_name _;
  client_max_body_size 20m;
  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.your-objectstorage.com; connect-src 'self' https:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self';" always;

  # Proxy API requests to the backend service on the Docker network
  location /api/ {
    proxy_pass http://api:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Serve static assets directly with cache; SPA fallback to index.html
  location / {
    try_files $uri /index.html;
  }

  # Optional: basic caching for static assets
  location ~* \.(?:js|css|woff2?|eot|ttf|otf|svg)$ {
    expires 7d;
    access_log off;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri /index.html;
  }
}
