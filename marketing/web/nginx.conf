server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Long cache for fingerprinted assets
  location /_astro/ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Short cache for public assets (logos, favicons, images)
  location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    access_log off;
    try_files $uri =404;
  }

  # Clean URLs: /features/budget → /features/budget/index.html
  # Unknown paths fall through to the custom 404 page (not a SPA fallback)
  location / {
    try_files $uri $uri/index.html $uri.html =404;
  }

  # Serve generated sitemap index / sitemaps / robots.txt at root
  location = /robots.txt      { access_log off; try_files $uri =404; }
  location = /sitemap-index.xml { access_log off; try_files $uri =404; }
  location ~ ^/sitemap-\d+\.xml$ { access_log off; try_files $uri =404; }

  # Legacy .html URLs from the previous site — 301 to the new clean URLs
  location = /index.html                  { return 301 /; }
  location = /offer.html                  { return 301 /offer; }
  location = /faq.html                    { return 301 /faq; }
  location = /contact.html                { return 301 /contact; }
  location = /privacy.html                { return 301 /privacy; }
  location = /terms.html                  { return 301 /terms; }
  location = /sales.html                  { return 301 /sales; }
  location = /legal.html                  { return 301 /legal; }
  location = /activate.html               { return 301 /trial/activate; }
  location = /features/                   { return 301 /features; }
  location = /features/index.html         { return 301 /features; }
  location = /features/budget.html        { return 301 /features/budget; }
  location = /features/portfolio.html     { return 301 /features/portfolio; }
  location = /features/knowledge.html     { return 301 /features/knowledge; }
  location = /features/ai.html            { return 301 /features/ai; }
  # IT Ops page renamed to IT Landscape
  location = /features/it-ops.html        { return 301 /features/it-landscape; }
  location = /features/it-ops             { return 301 /features/it-landscape; }
  location = /features/it-ops/            { return 301 /features/it-landscape; }
  # Obsolete comparison page
  location = /features/comparison.html    { return 301 /features; }

  # Custom 404 page (Astro builds dist/404.html from src/pages/404.astro)
  error_page 404 /404.html;
  location = /404.html { internal; }

  # gzip (brotli handled upstream if configured)
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
  gzip_vary on;
}
