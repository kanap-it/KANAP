site_name: KANAP
site_url: https://doc.kanap.net
site_description: User documentation for KANAP - IT portfolio and budget management platform

repo_url: https://github.com/your-org/kanap
repo_name: kanap

docs_dir: docs/en

theme:
  name: material
  language: en

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow

  icon:
    repo: fontawesome/brands/github

  # Custom logo (place in overrides/.icons/ or use default)
  # logo: assets/logo.png
  # favicon: assets/favicon.png

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://kanap.net
      name: KANAP Website

  # Language selector (when i18n is set up)
  # alternate:
  #   - name: English
  #     link: /en/
  #     lang: en
  #   - name: Français
  #     link: /fr/
  #     lang: fr

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: en

nav:
  - Home: index.md

  - Fast Track:
    - "Getting Started": fast-track/getting-started.md
    - "From Request to Delivery": fast-track/index.md
    - "From Application to Server": fast-track/apps-and-assets.md

  - Dashboard: my-dashboard.md

  - Portfolio Management:
    - Tasks: tasks.md
    - Requests: portfolio-requests.md
    - Projects: portfolio-projects.md
    - Planning: portfolio-planning.md
    - Team Members: portfolio-team-members.md
    - Reporting: portfolio-reporting.md
    - Settings: portfolio-settings.md

  - Budget Management:
    - OPEX: opex.md
    - CAPEX: capex.md
    - Contracts: contracts.md
    - Budget Administration: budget-operations.md
    - Reports: reports.md

  - IT Operations:
    - Infrastructure:
      - Locations: locations.md
      - Assets: assets.md
      - Connections: connections.md
      - Connection Map: connection-map.md
    - Applications:
      - Applications: applications.md
      - Interfaces: interfaces.md
      - Interface Map: interface-map.md
    - Settings: it-ops-settings.md

  - Master Data:
    - Organization:
      - Companies: companies.md
      - Departments: departments.md
    - External Parties:
      - Suppliers: suppliers.md
      - Contacts: contacts.md
    - Finance:
      - Chart of Accounts: chart-of-accounts.md
      - Currencies: currencies.md
    - Classification:
      - Business Processes: business-processes.md
      - Analytics Dimensions: analytics.md

  - Administration:
    - Admin & Users: admin.md
    - Master Data Administration: master-data-operations.md
    - Budget Overview: operations-dashboard.md

  - On-Premise:
    - Overview: on-premise/index.md
    - Installation: on-premise/installation.md
    - Configuration: on-premise/configuration.md
    - Operations: on-premise/operations.md
    - Microsoft Entra SSO: on-premise/sso-entra.md
