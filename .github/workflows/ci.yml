name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    strategy:
      matrix:
        mode: [cloud, onprem]
    env:
      DEPLOYMENT_MODE: ${{ matrix.mode == 'onprem' && 'single-tenant' || '' }}
      DATABASE_URL: postgres://app:app@127.0.0.1:5432/appdb
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build backend (${{ matrix.mode }})
        working-directory: backend
        run: npm ci && npm run build
      - name: Prepare CI PostgreSQL role/database (${{ matrix.mode }})
        if: matrix.mode == 'cloud'
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "CREATE ROLE app LOGIN PASSWORD 'app' NOSUPERUSER NOBYPASSRLS;"
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE appdb OWNER app;"
          psql -h 127.0.0.1 -U postgres -d appdb -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS citext;"
          psql -h 127.0.0.1 -U postgres -d appdb -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -h 127.0.0.1 -U postgres -d appdb -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
          psql -h 127.0.0.1 -U postgres -d appdb -v ON_ERROR_STOP=1 -c "GRANT ALL ON SCHEMA public TO app;"
      - name: Prepare backend database (${{ matrix.mode }})
        if: matrix.mode == 'cloud'
        working-directory: backend
        run: npm run typeorm -- migration:run
      - name: Run backend hardening checks (${{ matrix.mode }})
        if: matrix.mode == 'cloud'
        working-directory: backend
        run: npm run test:tenant-isolation && npm run test:rls && npm run test:ai
      - name: Build frontend (${{ matrix.mode }})
        working-directory: frontend
        run: npm ci && npm run build
